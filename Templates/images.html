<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Logo.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f3f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topHeader {
            width: 100%;
            padding: 18px 35px;
            font-size: 22px;
            font-weight: bold;
            color: #111827;
            border-bottom: 1px solid #e2e8f0;
        }

        .gallery-section {
            flex: 1;
            padding: 30px 60px;
        }

        .gallery-section h1 {
            font-size: 38px;
            font-family: Georgia, serif;
            color: #0f172a;
            font-weight: normal;
            margin-bottom: 24px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0px 5px 18px rgba(0, 0, 0, 0.08);
            border-left: 7px solid #2563eb;
            transition: 0.3s;
        }

        .image-card:hover {
            transform: translateY(-3px);
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.13);
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 16px 20px;
        }

        .card-title {
            font-size: 15px;
            color: #111827;
            font-weight: bold;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            display: inline-block;
            background: #2d2d38;
            color: white;
            padding: 9px 20px;
            border-radius: 6px;
            font-size: 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #111827;
        }

        .footer {
            width: 100%;
            height: 85px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 70px;
            color: #111827;
            font-size: 18px;
            font-weight: 500;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 1100px) {
            .gallery-section { padding: 20px; }
            .gallery-section h1 { font-size: 28px; }
            .footer { flex-direction: column; height: auto; padding: 15px; gap: 8px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="topHeader">🖼 Image Gallery</div>

    <div class="gallery-section">
        <h1>Uploaded Images</h1>
        <div class="gallery-grid">
            {% for image in images %}
            <div class="image-card">
                <img
                    src="{{ url_for('static', filename='Uploads/' + image) }}"
                    alt="{{ image }}"
                >
                <div class="card-body">
                    <div class="card-title">{{ image }}</div>
                    <a class="download-btn" href="{{ url_for('downloadImage', filename=image) }}">
                        ⬇ Download
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="footer">
        <span>© 2025 Image Gallery</span>
        <span>All rights reserved</span>
    </div>

</body>
</html>
